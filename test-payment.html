<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Processing - Anvik Biotecch</title>
    <script src="../env.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .payment-container {
            background: white;
            border-radius: 10px;
            padding: 40px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            text-align: center;
            max-width: 500px;
            width: 100%;
        }
        .payment-header {
            margin-bottom: 30px;
        }
        .payment-icon {
            font-size: 60px;
            margin-bottom: 20px;
            animation: spin 2s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }
        .payment-status {
            color: #666;
            font-size: 16px;
            margin-bottom: 30px;
            line-height: 1.6;
        }
        .order-id {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 5px;
            margin: 20px 0;
            font-family: monospace;
            color: #667eea;
            font-weight: bold;
        }
        .progress-bar {
            width: 100%;
            height: 4px;
            background: #e0e0e0;
            border-radius: 2px;
            margin: 20px 0;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: #667eea;
            width: 0%;
            animation: progress 3s ease-out forwards;
        }
        @keyframes progress {
            0% { width: 0%; }
            100% { width: 100%; }
        }
        .payment-info {
            background: #f0f4ff;
            border-left: 4px solid #667eea;
            padding: 15px;
            border-radius: 5px;
            margin: 20px 0;
            text-align: left;
            color: #333;
            font-size: 14px;
        }
        .timer {
            color: #667eea;
            font-weight: bold;
            margin: 20px 0;
            font-size: 18px;
        }
        .button-group {
            margin-top: 30px;
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
        }
        .btn-success {
            background: #4caf50;
            color: white;
        }
        .btn-success:hover {
            background: #45a049;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(76, 175, 80, 0.3);
        }
        .btn-cancel {
            background: #f44336;
            color: white;
        }
        .btn-cancel:hover {
            background: #da190b;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(244, 67, 54, 0.3);
        }
        .success-message {
            display: none;
            text-align: center;
            padding: 20px;
        }
        .success-icon {
            font-size: 80px;
            color: #4caf50;
            margin-bottom: 20px;
            animation: scaleIn 0.5s ease-out;
        }
        @keyframes scaleIn {
            0% { transform: scale(0); }
            100% { transform: scale(1); }
        }
        .error-message {
            color: #f44336;
            background: #ffebee;
            padding: 15px;
            border-radius: 5px;
            margin: 20px 0;
            display: none;
            border-left: 4px solid #f44336;
        }
        .security-note {
            font-size: 12px;
            color: #999;
            margin-top: 20px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="payment-container">
        <div class="payment-header">
            <div class="payment-icon">💳</div>
            <h1>Processing Payment</h1>
            <p class="payment-status">Please wait while we process your payment securely...</p>
        </div>

        <div class="order-id" id="orderDisplay">Order ID: Loading...</div>

        <div class="progress-bar">
            <div class="progress-fill"></div>
        </div>

        <div class="payment-info">
            <strong>Amount:</strong> <span id="amountDisplay">Loading...</span><br>
            <strong>Status:</strong> <span id="statusDisplay">Processing...</span>
        </div>

        <div class="timer">
            <span id="countdown">3</span>s remaining
        </div>

        <div class="success-message" id="successMessage">
            <div class="success-icon">✅</div>
            <h1>Payment Successful!</h1>
            <p style="color: #666; margin-top: 10px;">Your order has been confirmed.</p>
        </div>

        <div class="error-message" id="errorMessage"></div>

        <div class="button-group" id="actionButtons">
            <button class="btn btn-success" onclick="completePayment()">Complete Payment ✓</button>
            <button class="btn btn-cancel" onclick="cancelPayment()">Cancel Payment ✗</button>
        </div>

        <div class="security-note">
            🔒 This is a test payment page for demonstration purposes
        </div>
    </div>

    <script>
        const API = window.ENV.API_URL;

        document.addEventListener('DOMContentLoaded', function() {
            const urlParams = new URLSearchParams(window.location.search);
            const orderId = urlParams.get('orderId');
            const returnUrl = urlParams.get('returnUrl');

            if (!orderId) {
                showError('Order ID not found. Please go back and try again.');
                return;
            }

            console.log('📄 Test Payment Page');
            console.log('Order ID:', orderId);
            console.log('Return URL:', returnUrl);

            // Display order info
            document.getElementById('orderDisplay').textContent = `Order ID: ${orderId}`;

            // Simulate payment processing
            let countdown = 3;
            const countdownInterval = setInterval(() => {
                countdown--;
                document.getElementById('countdown').textContent = countdown;

                if (countdown <= 0) {
                    clearInterval(countdownInterval);
                    // Auto-confirm after 3 seconds
                    // Uncomment this line to auto-complete:
                    // completePayment();
                }
            }, 1000);

            // Store order ID for later use
            window.currentOrderId = orderId;
            window.returnUrl = returnUrl;
        });

        async function completePayment() {
            const orderId = window.currentOrderId;
            const returnUrl = window.returnUrl;

            console.log('✅ Completing payment for order:', orderId);

            try {
                // Update UI to show processing
                document.getElementById('actionButtons').style.display = 'none';
                document.getElementById('statusDisplay').textContent = 'Confirming...';

                // Small delay to simulate gateway response
                await new Promise(resolve => setTimeout(resolve, 500));

                // Show success message
                document.querySelector('.payment-header').style.display = 'none';
                document.getElementById('successMessage').style.display = 'block';
                document.getElementById('statusDisplay').textContent = 'Confirmed ✓';

                console.log('✅ Payment completed!');

                // Redirect to order success page after 2 seconds
                setTimeout(() => {
                    if (returnUrl) {
                        console.log('🔄 Redirecting to:', returnUrl);
                        window.location.href = returnUrl;
                    } else {
                        // Fallback to order-success
                        window.location.href = `/customer/order-success.html?orderId=${orderId}`;
                    }
                }, 2000);

            } catch (error) {
                console.error('Error completing payment:', error);
                showError('Error processing payment. Please try again.');
            }
        }

        function cancelPayment() {
            console.log('❌ Payment cancelled by user');
            showError('❌ Payment cancelled. Your order remains pending.');

            document.getElementById('actionButtons').style.display = 'none';
            document.getElementById('statusDisplay').textContent = 'Cancelled ✗';

            // Redirect back after 2 seconds
            setTimeout(() => {
                window.history.back();
            }, 2000);
        }

        function showError(message) {
            const errorEl = document.getElementById('errorMessage');
            errorEl.textContent = message;
            errorEl.style.display = 'block';
            document.getElementById('actionButtons').style.display = 'none';
            document.querySelector('.payment-header').style.display = 'none';
            document.querySelector('.progress-bar').style.display = 'none';
            document.querySelector('.payment-info').style.display = 'none';
            document.querySelector('.timer').style.display = 'none';
        }
    </script>
</body>
</html>
