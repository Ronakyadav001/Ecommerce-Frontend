<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products - Anvik Biotecch</title>

    <link rel="stylesheet" href="../styles/main.css?v=4">
    <link rel="stylesheet" href="../styles/customer.css?v=4">

    <!-- ✅ WhatsApp Widget CSS (ADDED) -->
    <link rel="stylesheet" href="../styles/whatsapp-widget.css?v=1">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-logo">
                <h2>Anvik Biotecch</h2>
            </div>
            <div class="mobile-menu-toggle">
                <span></span>
                <span></span>
                <span></span>
            </div>
            <ul class="nav-menu">
                <li class="nav-item">
                    <a href="index.html" class="nav-link">Home</a>
                </li>
                <li class="nav-item">
                    <a href="products.html" class="nav-link active">Products</a>
                </li>
                <li class="nav-item">
                    <a href="cart.html" class="nav-link">Cart (<span id="cartCount">0</span>)</a>
                </li>
                <li class="nav-item" id="authSection">
                    <!-- This will be populated by JavaScript -->
                </li>
            </ul>
        </div>
    </nav>

    <main class="customer-main">
        <div class="container">
            <div class="page-header">
                <h1>All Medicines</h1>
                <div class="search-filter">
                    <input type="text" id="searchInput" placeholder="Search medicines..." class="search-box">
                    <select id="categoryFilter" class="filter-select">
                        <option value="">All Categories</option>
                        <option value="tablet">Tablets</option>
                        <option value="syrup">Syrup</option>
                        <option value="injection">Injection</option>
                        <option value="ointment">Ointment</option>
                        <option value="soap">Soap</option>
                        <option value="capsule">Capsule</option>
                        <option value="oil">Oil</option>
                        <option value="gel">Gel</option>
                    </select>
                </div>
            </div>

            <div class="products-grid" id="productsGrid">
                <!-- Products will be loaded by JavaScript -->
            </div>
        </div>
    </main>

    <script src="../scripts/mobile-menu.js?v=4"></script>
    <script src="../scripts/utils.js?v=4"></script>
    <script src="../scripts/auth.js?v=4"></script>
    <script src="../scripts/customer.js?v=4"></script>
    <script src="../scripts/cart.js?v=4"></script>

    <!-- ✅ WhatsApp Widget Container (ADDED) -->
    <div id="whatsapp-widget-container"></div>

    <!-- ✅ WhatsApp Widget Loader (ADDED) -->
    <script>
        fetch('../whatsapp-widget.html')
          .then(res => res.text())
          .then(html => {
            document.getElementById('whatsapp-widget-container').innerHTML = html;

            const script = document.createElement('script');
            script.src = '../scripts/whatsapp-widget.js?v=1';
            script.defer = true;
            document.body.appendChild(script);
          })
          .catch(err => console.error('WhatsApp widget load error:', err));
    </script>

</body>
</html>
