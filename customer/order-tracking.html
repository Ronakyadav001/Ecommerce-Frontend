<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Track Order - Anvik Biotecch</title>
    <link rel="stylesheet" href="../styles/main.css?v=4">
    <link rel="stylesheet" href="../styles/customer.css?v=4">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-logo">
                <h2>Anvik Biotecch</h2>
            </div>
            <div class="mobile-menu-toggle">
                <span></span>
                <span></span>
                <span></span>
            </div>
            <ul class="nav-menu">
                <li class="nav-item">
                    <a href="index.html" class="nav-link">Home</a>
                </li>
                <li class="nav-item">
                    <a href="products.html" class="nav-link">Products</a>
                </li>
                <li class="nav-item">
                    <a href="cart.html" class="nav-link">Cart (<span id="cartCount">0</span>)</a>
                </li>
                <li class="nav-item">
                    <a href="orders.html" class="nav-link">My Orders</a>
                </li>
                <li class="nav-item" id="authSection">
                    <!-- This will be populated by JavaScript -->
                </li>
            </ul>
        </div>
    </nav>

    <main class="customer-main">
        <div class="container">
            <h1>Track Your Order</h1>
            
            <div class="tracking-search">
                <div class="search-box-container">
                    <input type="text" id="orderSearch" placeholder="Enter Order ID (e.g., ORD123456789)" class="search-box">
                    <button class="btn btn-primary" onclick="trackOrder()">Track Order</button>
                </div>
                <p class="search-help">Enter your Order ID to track its current status and delivery timeline.</p>
            </div>

            <div id="trackingResult" class="tracking-result">
                <!-- Tracking results will be displayed here -->
            </div>

            <div id="noTrackingResult" class="empty-state" style="display: none;">
                <h2>No Order Found</h2>
                <p>Please check your Order ID and try again.</p>
            </div>
        </div>
    </main>

    <script src="../scripts/mobile-menu.js?v=4"></script>
    <script src="../scripts/utils.js?v=4"></script>
    <script src="../scripts/auth.js?v=4"></script>
    <script src="../scripts/order-tracking.js?v=4"></script>
</body>
</html>
