<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - Anvik Biotecch</title>
    <link rel="stylesheet" href="../styles/main.css?v=4">
    <link rel="stylesheet" href="../styles/customer.css?v=4">
    <!-- Cashfree SDK -->
    <script src="https://sdk.cashfree.com/js/v3/cashfree.js"></script>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-logo">
                <h2>Anvik Biotecch</h2>
            </div>
            <div class="mobile-menu-toggle">
                <span></span>
                <span></span>
                <span></span>
            </div>
            <ul class="nav-menu">
                <li class="nav-item">
                    <a href="index.html" class="nav-link">Home</a>
                </li>
                <li class="nav-item">
                    <a href="products.html" class="nav-link">Products</a>
                </li>
                <li class="nav-item">
                    <a href="cart.html" class="nav-link">Cart (<span id="cartCount">0</span>)</a>
                </li>
                <li class="nav-item" id="authSection">
                    <!-- This will be populated by JavaScript -->
                </li>
            </ul>
        </div>
    </nav>

    <main class="customer-main">
        <div class="container">
            <h1>Checkout</h1>
            
            <div class="checkout-form">
                <div class="form-section">
                    <h3>Shipping Information</h3>
                    <form id="shippingForm">
                        <div class="form-row">
                            <div class="form-group">
                                <label for="firstName">First Name</label>
                                <input type="text" id="firstName" name="firstName" required>
                            </div>
                            <div class="form-group">
                                <label for="lastName">Last Name</label>
                                <input type="text" id="lastName" name="lastName" required>
                            </div>
                        </div>
                        <div class="form-group">
                            <label for="email">Email</label>
                            <input type="email" id="email" name="email" required>
                        </div>
                        <div class="form-group">
                            <label for="phone">Phone</label>
                            <input type="tel" id="phone" name="phone" required>
                        </div>
                        <div class="form-group">
                            <label for="address">Address</label>
                            <textarea id="address" name="address" rows="3" required></textarea>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label for="city">City</label>
                                <input type="text" id="city" name="city" required>
                            </div>
                            <div class="form-group">
                                <label for="state">State</label>
                                <input type="text" id="state" name="state" required>
                            </div>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label for="pincode">PIN Code</label>
                                <input type="text" id="pincode" name="pincode" required>
                            </div>
                            <div class="form-group">
                                <label for="country">Country</label>
                                <input type="text" id="country" name="country" value="India" readonly>
                            </div>
                        </div>
                    </form>
                </div>
                
                <div class="form-section">
                    <h3>Order Summary</h3>
                    <div id="orderSummary">
                        <!-- Order summary will be loaded by JavaScript -->
                    </div>
                    
                    <div class="order-review">
                        <h4>Payment Method</h4>
                        <div class="form-group">
                            <select id="paymentMethod">
                                <option value="cashfree">Online Payment (Cashfree)</option>
                                <option value="cod">Cash on Delivery</option>
                            </select>
                        </div>
                        
                        <button type="button" class="btn btn-primary btn-full" onclick="processPayment()">
                            Place Order
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="../scripts/mobile-menu.js?v=4"></script>
    <script src="../scripts/utils.js?v=4"></script>
    <script src="../scripts/auth.js?v=4"></script>
    <script src="../scripts/cart.js?v=4"></script>
    <script src="../scripts/payment.js?v=4"></script>
</body>
</html>
