<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Orders - Anvik Biotecch</title>
    <link rel="stylesheet" href="../styles/main.css?v=4">
    <link rel="stylesheet" href="../styles/customer.css?v=4">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-logo">
                <h2>Anvik Biotecch</h2>
            </div>
            <div class="mobile-menu-toggle">
                <span></span>
                <span></span>
                <span></span>
            </div>
            <ul class="nav-menu">
                <li class="nav-item">
                    <a href="index.html" class="nav-link">Home</a>
                </li>
                <li class="nav-item">
                    <a href="products.html" class="nav-link">Products</a>
                </li>
                <li class="nav-item">
                    <a href="cart.html" class="nav-link">Cart (<span id="cartCount">0</span>)</a>
                </li>
                <li class="nav-item">
                    <a href="order-tracking.html" class="nav-link">Track Order</a>
                </li>
                <li class="nav-item" id="authSection">
                    <!-- This will be populated by JavaScript -->
                </li>
            </ul>
        </div>
    </nav>

    <main class="customer-main">
        <div class="container">
            <div class="page-header">
                <h1>My Order History</h1>
                <a href="order-tracking.html" class="btn btn-secondary">Track Another Order</a>
            </div>

            <div class="orders-filter">
                <label>Filter by Status:</label>
                <select id="statusFilter" onchange="filterOrders()">
                    <option value="all">All Orders</option>
                    <option value="pending">Pending</option>
                    <option value="confirmed">Confirmed</option>
                    <option value="shipped">Shipped</option>
                    <option value="delivered">Delivered</option>
                    <option value="cancelled">Cancelled</option>
                </select>
            </div>
            
            <div id="ordersList">
                <!-- Orders will be loaded by JavaScript -->
            </div>
            
            <div id="emptyOrders" class="empty-state">
                <h2>No orders yet</h2>
                <p>Start shopping to see your order history here!</p>
                <a href="products.html" class="btn btn-primary">Shop Now</a>
            </div>
        </div>
    </main>

    <script src="../scripts/mobile-menu.js?v=4"></script>
    <script src="../scripts/utils.js?v=4"></script>
    <script src="../scripts/auth.js?v=4"></script>
    <script src="../scripts/orders.js?v=4"></script>
</body>
</html>
