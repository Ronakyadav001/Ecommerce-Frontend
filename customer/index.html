<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anvik Biotecch - Customer Portal</title>
    <link rel="stylesheet" href="../styles/main.css?v=4">
    <link rel="stylesheet" href="../styles/customer.css?v=4">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-logo">
                <h2>Anvik Biotecch</h2>
            </div>
            <div class="mobile-menu-toggle">
                <span></span>
                <span></span>
                <span></span>
            </div>
            <ul class="nav-menu">
                <li class="nav-item">
                    <a href="index.html" class="nav-link active">Home</a>
                </li>
                <li class="nav-item">
                    <a href="products.html" class="nav-link">Products</a>
                </li>
                <li class="nav-item">
                    <a href="cart.html" class="nav-link">Cart (<span id="cartCount">0</span>)</a>
                </li>
                <li class="nav-item" id="authSection">
                    <!-- This will be populated by JavaScript -->
                </li>
            </ul>
        </div>
    </nav>

    <main class="customer-main">
        <section class="hero-section">
            <div class="hero-content">
                <h1>Your Health, One Click Away</h1>
                <p>Join our platform for access to top-tier doctors and hassle-free appointments. Your wellness journey starts here.</p>
                <a href="products.html" class="btn btn-primary">Shop Now</a>
            </div>
        </section>

        <section class="featured-products">
            <div class="container">
                <h2>Featured Medicines</h2>
                <div class="products-grid" id="featuredProducts">
                    <!-- Featured products will be loaded by JavaScript -->
                </div>
            </div>
        </section>
    </main>

    <script src="../scripts/mobile-menu.js?v=4"></script>
    <script src="../scripts/utils.js?v=4"></script>
    <script src="../scripts/auth.js?v=4"></script>
    <script src="../scripts/customer.js?v=4"></script>
    <script src="../scripts/cart.js?v=4"></script>
<link rel="stylesheet" href="../styles/whatsapp-widget.css?v=1">

<div id="whatsapp-widget-container"></div>

<script>
fetch('../whatsapp-widget.html')
  .then(res => res.text())
  .then(html => {
    document.getElementById('whatsapp-widget-container').innerHTML = html;

    const script = document.createElement('script');
    script.src = '../scripts/whatsapp-widget.js?v=1';
    script.defer = true;
    document.body.appendChild(script);
  });
</script>

</body>
</html>
