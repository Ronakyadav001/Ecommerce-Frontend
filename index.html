<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anvik Biotecch - Your Health, One Click Away</title>
    <link rel="stylesheet" href="styles/main.css?v=4">
    <!-- Add WhatsApp widget CSS -->
    <link rel="stylesheet" href="styles/whatsapp-widget.css?v=1">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-logo">
                <h2>Anvik Biotecch</h2>
            </div>
            <div class="mobile-menu-toggle">
                <span></span>
                <span></span>
                <span></span>
            </div>
            <ul class="nav-menu">
                <li class="nav-item">
                    <a href="customer/index.html" class="nav-link">Customer Portal</a>
                </li>
                <li class="nav-item">
                    <a href="admin/login.html" class="nav-link">Admin Portal</a>
                </li>
            </ul>
        </div>
    </nav>
    <main class="hero-section">
        <div class="hero-content">
            <h1>Your Health, One Click Away</h1>
            <p>Join our platform for access to top-tier doctors and hassle-free appointments. Your wellness journey starts here.</p>
            <div class="hero-buttons">
                <a href="customer/index.html" class="btn btn-primary">Shop Medicines</a>
                <a href="admin/login.html" class="btn btn-secondary">Admin Login</a>
            </div>
        </div>
    </main>

    <!-- Include WhatsApp widget -->
    <div id="whatsapp-widget-container"></div>

    <script src="scripts/mobile-menu.js?v=4"></script>
    <!-- Load WhatsApp widget -->
    <script>
        // Load WhatsApp widget HTML
        fetch('whatsapp-widget.html')
            .then(response => response.text())
            .then(html => {
                document.getElementById('whatsapp-widget-container').innerHTML = html;
                // Now load the JavaScript
                const script = document.createElement('script');
                script.src = 'scripts/whatsapp-widget.js?v=1';
                document.body.appendChild(script);
            })
            .catch(err => {
                console.error('Failed to load WhatsApp widget:', err);
            });
    </script>
</body>
</html>
