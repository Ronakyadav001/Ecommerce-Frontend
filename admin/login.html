<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Anvik Biotecch</title>
    <link rel="stylesheet" href="../styles/main.css?v=4">
    <link rel="stylesheet" href="../styles/admin.css?v=4">
</head>
<body class="login-body">
    <div class="login-container">
        <div class="login-header">
            <h1>Anvik Biotecch</h1>
            <p>Your Health, One Click Away</p>
        </div>
        
        <div class="login-card">
            <h2>Admin Login</h2>
            
            <form id="loginForm" class="login-form">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" required>
                </div>
                
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required>
                </div>
                
                <button type="submit" class="btn btn-primary btn-full">Sign in</button>
                
                <div class="demo-credentials">

                </div>
            </form>
        </div>
    </div>
    
    <script>
    // Define API base URL
    const API_BASE_URL = 'https://bakend-88v1.onrender.com/api';
    
    document.getElementById('loginForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        
        // Get form elements
        const usernameInput = document.getElementById('username');
        const passwordInput = document.getElementById('password');
        const submitButton = this.querySelector('button[type="submit"]');
        
        // Get values and trim whitespace
        const username = usernameInput.value.trim();
        const password = passwordInput.value;
        
        // Validate inputs
        if (!username || !password) {
            alert('Please enter both username and password');
            return;
        }
        
        try {
            // Disable form while submitting
            submitButton.disabled = true;
            submitButton.textContent = 'Signing in...';
            
            console.log('Attempting login...', { username });
            
            const response = await fetch(`${API_BASE_URL}/auth/login`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Accept': 'application/json'
                },
                body: JSON.stringify({ 
                    username: username,
                    password: password 
                })
            });

            console.log('Response status:', response.status);
            const data = await response.json();
            console.log('Response data:', data);

            if (!response.ok) {
                if (data.error) {
                    throw new Error(data.error);
                } else {
                    throw new Error('Login failed. Please check your credentials.');
                }
            }

            if (!data.user || !data.token) {
                throw new Error('Invalid server response');
            }

            if (data.user.role !== 'admin') {
                throw new Error('Access denied. This login is for admin users only.');
            }

            // Store auth data
            localStorage.setItem('authToken', data.token);
            localStorage.setItem('user', JSON.stringify(data.user));
            localStorage.setItem('isAdminLoggedIn', 'true');
            
            console.log('Login successful, redirecting...');
            window.location.href = 'dashboard.html';
            
        } catch (error) {
            console.error('Login error:', error);
            alert('Login failed: ' + error.message);
        } finally {
            // Re-enable form
            submitButton.disabled = false;
            submitButton.textContent = 'Sign in';
        }
    });
    
    // Clear any stored auth data on the login page
    window.addEventListener('load', function() {
        localStorage.removeItem('authToken');
        localStorage.removeItem('user');
        localStorage.removeItem('isAdminLoggedIn');
    });
    </script>
</body>
</html>
