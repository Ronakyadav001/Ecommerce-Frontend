<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sales Report - Anvik Biotecch</title>
    <link rel="stylesheet" href="../styles/main.css?v=4" />
    <link rel="stylesheet" href="../styles/admin.css?v=4" />

    <style>
        /* ✅ Optional: clean summary styling */
        #filterSummary {
            background: #f6f9ff;
            border: 1px solid #d7e2f2;
            border-radius: 10px;
            padding: 12px;
            margin-top: 20px;
            font-size: 15px;
            text-align: center;
            color: #333;
            display: none;
        }
    </style>
</head>

<body class="admin-body">
    <div class="admin-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2>Anvik Biotecch</h2>
            </div>
            <nav class="sidebar-nav">
                <ul>
                    <li><a href="dashboard.html" class="nav-link">Dashboard</a></li>
                    <li><a href="dashboard.html#medicines-stock" class="nav-link">Medicines Stock</a></li>
                    <li><a href="sales.html" class="nav-link active">Sales</a></li>
                    <li><a href="reports.html" class="nav-link">Reports</a></li>
                </ul>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="content-header">
                <h1>Sales Report</h1>
                <div class="header-actions">
                    <span>Welcome, Admin</span>
                    <button id="logoutBtn" class="btn btn-secondary">Logout</button>
                </div>
            </header>

            <section class="section">
                <!-- Top Sales Stats -->
                <div class="sales-stats">
                    <div class="stat-card">
                        <h3>Total Sales</h3>
                        <p class="stat-number" id="totalSalesCard">₹45,670</p>
                    </div>
                    <div class="stat-card">
                        <h3>Orders Today</h3>
                        <p class="stat-number" id="ordersCard">24</p>
                    </div>
                    <div class="stat-card">
                        <h3>Pending Orders</h3>
                        <p class="stat-number" id="pendingOrdersCard">8</p>
                    </div>
                </div>

                <!-- Filters -->
                <div
                    class="filters"
                    style="display: flex; gap: 12px; align-items: center; margin: 18px 0; flex-wrap: wrap;"
                >
                    <div style="display: flex; gap: 6px; align-items: center;">
                        <label for="startDate" style="font-weight: 600; color: #333;">Start</label>
                        <input type="date" id="startDate" />
                    </div>
                    <div style="display: flex; gap: 6px; align-items: center;">
                        <label for="endDate" style="font-weight: 600; color: #333;">End</label>
                        <input type="date" id="endDate" />
                    </div>
                    <button id="applyDateFilterBtn" class="btn btn-primary">Apply Date Filter</button>

                    <div style="display: flex; gap: 6px; align-items: center; margin-left: 8px;">
                        <label for="monthPicker" style="font-weight: 600; color: #333;">Month</label>
                        <input type="month" id="monthPicker" />
                    </div>
                    <button id="applyMonthFilterBtn" class="btn btn-primary">Filter Month</button>

                    <button id="clearFiltersBtn" class="btn btn-secondary">Clear Filters</button>
                </div>

                <!-- Orders Table -->
                <div class="table-container">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>Order ID</th>
                                <th>Customer</th>
                                <th>Amount</th>
                                <th>Status</th>
                                <th>Date</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="ordersList">
                            <!-- Orders populated by admin-api.js -->
                        </tbody>
                    </table>
                </div>

                <!-- ✅ Added Summary Section (appears after filtering) -->
                <div id="filterSummary"></div>
            </section>
        </main>
    </div>

    <!-- JS Files -->
    <script src="../scripts/utils.js?v=4"></script>
    <script src="../scripts/api-service.js?v=4"></script>
    <script src="../scripts/admin-api.js?v=4"></script>
    <script src="../scripts/admin.js?v=4"></script>
</body>
</html>
